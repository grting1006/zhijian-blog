<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的随笔 | 纸间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell page-enter">
      <header class="topbar"><a class="brand" href="index.html"><span>纸</span>间</a><a class="back-link" href="index.html">← 返回阅读</a></header>
      <main class="notes-layout">
        <section class="notes-editor"><p class="eyebrow">PRIVATE READING NOTES</p><h1>我的随笔</h1><p class="notes-intro">这里的文字只保留在这台设备上。</p><label>标题<input id="noteTitle" maxlength="60" placeholder="今天读到了什么？" /></label><label>感悟<textarea id="noteContent" rows="11" placeholder="写下你的阅读感悟……"></textarea></label><div class="note-actions"><button class="reference-button" id="openReferences" type="button">引用收藏</button><button class="save-button" id="saveNote" type="button">保存随笔</button></div></section>
        <aside class="notes-list-wrap"><div class="index-head"><span>已保存的随笔</span><span id="notesCount">00</span></div><div class="notes-list" id="notesList"></div></aside>
      </main>
    </div>
    <dialog id="referencesDialog"><section class="favorites-card"><div class="composer-head"><div><p class="eyebrow">YOUR SAVES</p><h2>引用收藏</h2></div><button class="icon-button" id="closeReferences" type="button" aria-label="关闭">×</button></div><div class="reference-list" id="referenceList"></div></section></dialog>
    <script src="notes.js"></script>
  </body>
</html>
