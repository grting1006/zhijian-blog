<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f7f3" />
    <title>纸间 | 个人博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="#" aria-label="纸间首页"><span>纸</span>间</a>
        <nav aria-label="主要导航"><a class="active" href="#latest">文章</a><a href="#about">关于</a></nav>
        <div class="topbar-actions"><button class="favorites-button" id="openFavorites" type="button">收藏夹</button><a class="journal-link" href="notes.html">随笔</a><button class="publish-button admin-only" id="openComposer" type="button"><span>+</span> 管理文章</button></div>
      </header>

      <main>
        <section class="intro" id="latest">
          <p class="eyebrow">PERSONAL NOTES / 2026</p>
          <h1>在日常里<br />收集一点光。</h1>
          <p class="intro-copy">日常财报</p>
        </section>

        <div class="content-grid">
          <aside class="article-index" aria-label="文章列表">
            <div class="index-head"><span>文章目录</span><div class="article-filter"><label for="dateFilter">日期</label><input id="dateFilter" type="date" aria-label="按日期筛选文章" /><span id="articleCount">00</span></div></div>
            <div id="articleList" class="article-list"></div>
          </aside>
        </div>
      </main>

      <footer id="about"><p>纸间 · 一方私人的记录空间</p><p>© 2026</p></footer>
    </div>

    <dialog id="composer">
      <form method="dialog" class="composer-card" id="articleForm">
        <div class="composer-head"><div><p class="eyebrow" id="composerKicker">NEW ENTRY</p><h2 id="composerTitle">写下这一刻</h2></div><button class="icon-button" type="button" id="closeComposer" aria-label="关闭">×</button></div>
        <label>文章标题<input id="titleInput" required maxlength="70" placeholder="给这篇文章一个标题" /></label>
        <div class="form-row"><label>日期<input id="dateInput" type="date" required /></label><label>分类<input id="categoryInput" required maxlength="20" placeholder="如：随笔" /></label></div>
        <label>摘要<textarea id="excerptInput" required maxlength="150" rows="2" placeholder="用一句话概括这篇文章"></textarea></label>
        <label>正文 <span class="label-note">支持简单 Markdown</span><textarea id="contentInput" required rows="8" placeholder="从这里开始写……"></textarea></label>
        <div class="content-tools"><input type="file" id="imageInput" accept="image/*" hidden /><button type="button" class="tool-button" id="imageButton">添加图片</button><button type="button" class="tool-button" id="chartButton">插入图表</button></div>
        <div class="chart-builder" id="chartBuilder" hidden><label>图表标题<input id="chartTitle" maxlength="30" placeholder="如：本周阅读时长" /></label><label>标签 <span class="label-note">用逗号分隔</span><input id="chartLabels" placeholder="周一, 周二, 周三" /></label><label>数值 <span class="label-note">用逗号分隔</span><input id="chartValues" inputmode="decimal" placeholder="2, 4, 3" /></label><button type="button" class="insert-chart-button" id="insertChart">添加到正文</button></div>
        <div class="import-row"><input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden /><button type="button" class="import-button" id="importButton">从文件导入</button><span id="fileName">支持 .md / .txt</span></div>
        <div class="composer-actions"><button type="button" class="cancel-button" id="cancelComposer">取消</button><button class="save-button" type="submit" id="submitArticle">发布文章</button></div>
      </form>
    </dialog>
    <dialog id="favoritesDialog">
      <section class="favorites-card">
        <div class="composer-head"><div><p class="eyebrow">MY COLLECTIONS</p><h2>收藏夹</h2></div><button class="icon-button" type="button" id="closeFavorites" aria-label="关闭">×</button></div>
        <form class="folder-form" id="folderForm"><input id="folderInput" maxlength="20" required placeholder="新建收藏夹名称" /><button class="save-button" type="submit">新建</button></form>
        <div class="folder-pills" id="folderPills"></div>
        <div class="favorites-list" id="favoritesList"></div>
      </section>
    </dialog>
    <script src="local-content.js"></script>
    <script src="articles.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
  </body>
</html>
